  <main class="wrap page-grid"><section class="card section-card"><div class="section-head"><div><span class="section-kicker">Camera Realtime</span><h2>摄像头实时识别</h2><p>支持实时检测、框叠加显示、跟踪重置与目标稳定计数，适合答辩现场演示。</p></div><div class="section-tag warn">实时模式</div></div><div class="grid two equal"><div class="pane pane-input"><div class="camera-panel"><div class="preview-title">摄像头画面</div><div class="camera-wrap"><video id="cameraVideo" autoplay muted playsinline></video><canvas id="overlayCanvas"></canvas></div><div class="row-btns camera-actions"><button id="startCameraBtn" class="btn btn-primary btn-lg">开启摄像头</button><button id="stopCameraBtn" class="btn btn-secondary" disabled>关闭摄像头</button><button id="resetTrackerBtn" class="btn btn-ghost-dark" disabled>重置跟踪</button></div></div></div><div class="pane pane-output"><div id="cameraSummary" class="summary">暂无结果</div><div class="result-list-title">实时检测详情</div><div id="cameraDetections" class="detection-list"></div></div></div></section></main>
  <footer class="wrap footer">基于 Python、YOLOv8、Node.js 与前端多页面展示构建，已按 9 类垃圾体系重构，cardboard 已并入 paper。</footer>
