  <main class="wrap page-grid"><section class="card section-card"><div class="section-head"><div><span class="section-kicker">Recycle Points</span><h2>回收点检索</h2><p>根据当前识别类别自动联动检索关键词，也支持手动输入城市和关键词进行查询。</p></div></div><div class="search-panel"><div class="inline-fields form-row"><div class="field-wrap grow"><label class="field-label">回收点关键词</label><input type="text" id="recycleKeyword" placeholder="如：废纸回收点 / 有害垃圾回收点"></div><div class="field-wrap small"><label class="field-label">城市（选填）</label><input type="text" id="recycleCity" placeholder="如：厦门"></div><div class="field-wrap actions-only"><label class="field-label hidden-label">操作</label><button id="searchRecycleBtn" class="btn btn-primary btn-lg full">查询回收点</button></div></div></div><div id="recyclePointTips" class="tip large-tip"></div><div id="recyclePoints" class="knowledge-grid"></div></section></main>
